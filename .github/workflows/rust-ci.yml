name: Rust CI

on:
  push:
    branches:
      - main
      - 'gaebal/**'
      - 'omx-issue-*'
    paths:
      - .github/workflows/rust-ci.yml
      - .github/dependabot.yml
      - .github/scripts/check_doc_source_of_truth.py
      - .github/FUNDING.yml
      - "*.bat"
      - "*.ps1"
      - README.md
      - USAGE.md
      - PARITY.md
      - PHILOSOPHY.md
      - ROADMAP.md
      - bin/windows/**
      - docs/**
      - rust/**
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/rust-ci.yml
      - .github/dependabot.yml
      - .github/scripts/check_doc_source_of_truth.py
      - .github/FUNDING.yml
      - "*.bat"
      - "*.ps1"
      - README.md
      - USAGE.md
      - PARITY.md
      - PHILOSOPHY.md
      - ROADMAP.md
      - bin/windows/**
      - docs/**
      - rust/**
  workflow_dispatch:

concurrency:
  group: rust-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: rust

env:
  CARGO_TERM_COLOR: always

jobs:
  doc-source-of-truth:
    name: docs source-of-truth
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Check docs and metadata for stale branding
        run: python .github/scripts/check_doc_source_of_truth.py

  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.86.0
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: Check formatting
        run: cargo fmt --all --check

  test-workspace:
    name: cargo test --workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.86.0
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: Run workspace tests
        run: cargo test --workspace

  clippy-workspace:
    name: cargo clippy --workspace --all-targets -- -D warnings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.86.0
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: Run workspace clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  cargo-audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.86.0
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run dependency audit
        run: cargo audit
